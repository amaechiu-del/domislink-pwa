version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd apps/web
            - npm install
        build:
          commands:
            - npm run build
        postBuild:
          commands:
            - echo "Frontend build complete"
      artifacts:
        baseDirectory: apps/web/dist
        files:
          - "**/*"
      cache:
        paths:
          - apps/web/node_modules/**/*
      environment:
        variables:
          VITE_API_URL: ""  # Set to your Elastic Beanstalk URL in Amplify console
    appRoot: .
