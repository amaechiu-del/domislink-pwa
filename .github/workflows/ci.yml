name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-web:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm install

      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          VITE_API_URL: ""

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

  validate-api:
    name: Validate API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm install

      - name: Check syntax — all source files
        working-directory: apps/api
        run: |
          for f in src/index.js src/pb.js src/validators.js \
                   src/curriculum/generator.js \
                   src/routes/lessons.js src/routes/curriculum.js; do
            node --input-type=module --check < "$f" && echo "✓ $f"
          done
